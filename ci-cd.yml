trigger:
  branches:
    include:
      - main

variables:
  imageName: 'miapp'
  imageTag: '$(Build.BuildId)'

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build & Package Image
  jobs:
  - job: BuildAndPackage
    displayName: Build and Publish Artifacts
    steps:
    - checkout: self

    # (Opcional) Mostrar versión de Docker
    - script: |
        docker version
      displayName: 'Check Docker'

    # Habilitar builder moderno
    - task: DockerInstaller@0
      displayName: 'Enable buildx'

    # Build y exportar la imagen como TAR + render de compose
    - script: |
        set -e
        echo "Building image $(imageName):$(imageTag)..."
        docker build -t $(imageName):$(imageTag) -t $(imageName):latest -f docker/Dockerfile .

        echo "Packaging artifacts..."
        mkdir -p out
        docker save $(imageName):$(imageTag) -o out/$(imageName)-$(imageTag).tar

        # Render del docker-compose.yml usando la imagen con el tag del build
        sed "s|__IMAGE__|$(imageName):$(imageTag)|g" docker/docker-compose.yml > out/docker-compose.yml
      displayName: 'Build image and export as TAR'

    # (Opcional) Generar un .env de ejemplo para pruebas posteriores
    - script: |
        set -e
        cat > out/.env << 'EOF'
        APP_NAME=Laravel
        APP_ENV=testing
        APP_DEBUG=false
        APP_URL=$(APP_URL)

        DB_CONNECTION=mysql
        DB_HOST=mariadb
        DB_PORT=3306
        DB_DATABASE=$(DB_DATABASE)
        DB_USERNAME=$(DB_USERNAME)
        DB_PASSWORD=$(DB_PASSWORD)
        DB_ROOT_PASSWORD=$(DB_ROOT_PASSWORD)
        EOF
      displayName: 'Render .env'
      env:
        APP_URL: $(APP_URL)
        DB_DATABASE: $(DB_DATABASE)
        DB_USERNAME: $(DB_USERNAME)
        DB_PASSWORD: $(DB_PASSWORD)
        DB_ROOT_PASSWORD: $(DB_ROOT_PASSWORD)

    # Publicar artefactos
    - publish: out
      artifact: image-bundle
      displayName: 'Publish artifact (image tar + compose + env)'